name: WebUntis Google Sync

on:
  schedule:
    # Läuft alle 2 Stunden (kannst du beliebig anpassen)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Ermöglicht den manuellen Start per Button auf GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Code auschecken
      uses: actions/checkout@v3

    - name: Google Chrome für Selenium installieren
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser

    - name: Python einrichten
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Abhängigkeiten installieren
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Sync ausführen
      env:
        UNTIS_SCHOOL: ${{ secrets.UNTIS_SCHOOL }}
        UNTIS_USER: ${{ secrets.UNTIS_USER }}
        UNTIS_PASSWORD: ${{ secrets.UNTIS_PASSWORD }}
        UNTIS_SERVER: ${{ secrets.UNTIS_SERVER }}
        UNTIS_WEEKS: 4
        UNTIS_HEADLESS: true
      run: |
        # Erstellt die .env-Datei, die das Skript zwingend erwartet
        echo "UNTIS_SCHOOL='$UNTIS_SCHOOL'" > .env
        echo "UNTIS_USERNAME='$UNTIS_USER'" >> .env
        echo "UNTIS_PASSWORD='$UNTIS_PASSWORD'" >> .env
        echo "UNTIS_SERVER='$UNTIS_SERVER'" >> .env
        echo "UNTIS_WEEKS=$UNTIS_WEEKS" >> .env
        echo "UNTIS_HEADLESS=$UNTIS_HEADLESS" >> .env
        
        # Ordner für die JSON-Daten erstellen, falls das Skript es verlangt
        mkdir -p weekly_data logs
        
        # Google Credentials bereitstellen
        echo '${{ secrets.GOOGLE_CREDENTIALS }}' > credentials.json
        
        # Rechte vergeben und die vom Entwickler vorgesehene run_full_sync starten
        chmod +x run_full_sync.sh auto_sync.sh check_status.sh
        ./run_full_sync.sh
